    category: doctor_name
    severity: high
    expected_spoken_contains:
      - "cho"
      - "next week"

  # --- Medications, dosages, and frequency abbreviations (high: dosing safety) ---
  - id: med_001
    input: "Take Amox-Clav 625mg BID x5d."
    category: medication_dosage
    severity: high
    expected_spoken_contains:
      - "amoxicillin clavulanate"
      - "six hundred twenty five milligrams"
      - "twice daily"
      - "five days"

  - id: med_002
    input: "Take Metformin 500 mg twice daily with meals."
    category: medication_dosage
