# TTSBench healthcare dataset (v1).
#
# ~30 hand-crafted items representing text a healthcare voice agent actually says.
# expected_spoken_contains entries are REQUIRED substrings: an item passes only
# when every pattern is found in the normalized transcript. Normalization
# (applied to both transcript and patterns) is: lowercase, strip punctuation,
# collapse whitespace, hyphens -> spaces. So patterns are lowercase words, the
# spelled-out spoken form (e.g. "twenty milligrams"), not the written input.
#
# Many medication/dosage items intentionally use clinical shorthand (BID, mcg,
# x5d). These are expected to surface pronunciation failures, which is the point:
# pass/fail is a signal for human review, not a verdict.

name: healthcare
items:
  # --- Appointment confirmations with non-Anglo doctor names ---
  - id: appt_001
    input: "Your appointment with Dr. Iyer is on Tuesday at 3:30 PM."
    category: appointment
    severity: medium
    expected_spoken_contains:
      - "iyer"
      - "tuesday"
      - "three thirty"

  - id: appt_002
    input: "Dr. Nguyen will see you in room 4 at 9 AM."
    category: appointment
    severity: medium
    expected_spoken_contains:
      - "nguyen"
      - "room"
      - "nine"

  - id: appt_003
    input: "Please arrive fifteen minutes before your visit with Dr. Okonkwo."
    category: appointment
    severity: medium
    expected_spoken_contains:
      - "fifteen minutes"
      - "okonkwo"

  - id: appt_004
    input: "Your follow-up with Dr. Rodriguez is confirmed for next Monday."
    category: appointment
    severity: medium
    expected_spoken_contains:
      - "rodriguez"
      - "monday"

  # --- Doctor name pronunciation (high: getting a clinician's name wrong erodes trust) ---
  - id: name_001
    input: "Dr. Patel's office is on the third floor."
    category: doctor_name
    severity: high
    expected_spoken_contains:
      - "patel"
      - "third floor"

  - id: name_002
    input: "Dr. Mehta prescribed a new medication for you."
    category: doctor_name
    severity: high
    expected_spoken_contains:
