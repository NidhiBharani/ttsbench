name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        # piper ships a lightweight bundled eSpeak that the pronunciation tests
        # exercise for real (no model download), so it must be present in CI.
        run: pip install -e ".[dev,piper]"

      - name: Lint
        run: |
          ruff check .
          mypy ttsbench

      - name: Test
        run: pytest
